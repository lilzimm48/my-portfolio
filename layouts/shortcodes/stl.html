<div id="stl_cont_{{ .Get "id" }}" style="width: 100%; height: 500px; display: block; background-color: #1a1a1a;"></div>

<script src="/js/stl_viewer.min.js"></script>
<script>
    var stl_viewer = new StlViewer(
        document.getElementById("stl_cont_{{ .Get "id" }}"),
        { 
            models: [ {id: 0, filename: "{{ .Get "src" | safeURL }}"} ],
            js_path: "/js/", 
            auto_load: true,
            bg_color: "#1a1a1a",
            model_color: "#00ff00"
        }
    );
</script>
