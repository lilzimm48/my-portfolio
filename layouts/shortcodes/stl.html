<div id="stl_cont_{{ .Get "id" }}" style="width:100%; height:500px; border:1px solid #444;"></div>

<script src="/js/stl_viewer.min.js"></script>
<script>
    var stl_viewer = new StlViewer(
        document.getElementById("stl_cont_{{ .Get "id" }}"),
        { 
            models: [ {id: 0, filename: "{{ .Get "src" | relURL }}"} ],
            js_path: "/js/", // This tells the viewer where to find the other files!
            backgroundColor: "#1a1a1a",
            color: "#00ff00"
        }
    );
</script>
