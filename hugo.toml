baseURL = 'https://jacobz.xyz/'
languageCode = 'en-us'
title = 'jacobz.xyz'
description = 'currently under construction'
theme = 're-terminal' 

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
    enableThemeSelection = true
    avatar = "/darklogo.png"
    logo = "/darklogo.png"
    contentTypeName = "posts"
    themeColor = "blue"
    showMenuItems = 6
    showLanguageSelector = false
    fullWidthTheme = true
    centerTheme = true
    autoCover = true
    showLastUpdated = false
    terminalFont = true

    [params.banner]
    dismissible = false
    text = "currently under construction..."
  # url = "https://github.com/mirus-ua/hugo-theme-re-terminal"

[[params.social]]
    name = "github"
    url = "https://github.com/lilzimm48"

[[params.social]]
    name = "tiktok"
    url = "https://www.tiktok.com/@jacobz.xyz"


[languages]
  [languages.en.params]
    languageName = "English"
    title = "re-Terminal"
    subtitle = "A simple, retro theme for Hugo"
    owner = ""
    keywords = ""
    copyright = ""
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "Back to home page"
    minuteReadingTime = "min read"
    words = "words"


    [languages.en.params.logo]
      logoText = "jacobz.xyz"
      logoHomeLink = "/"

    [languages.en.menu]
      # Submenus is available since v2.1.0
      # [[languages.en.menu.main]]
      #   identifier = "submenuParent"
      #   name = "Submenu"
      # [[languages.en.menu.main]]
      #   parent = "submenuParent"
      #   identifier = "anItem"
      #   name = "AnItem"
      [[languages.en.menu.main]]
        identifier = "categories"
        name = "categories"
        url = "/categories"
      [[languages.en.menu.main]]
        identifier = "tiktok"
        name = "tiktok"
        url = "https://www.tiktok.com/@jacobz.xyz"
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "tags"
        url = "/tags"

